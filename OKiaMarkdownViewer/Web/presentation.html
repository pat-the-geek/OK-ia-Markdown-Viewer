<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="presentation.css" />
  <!-- Offline vendored libraries (no CDN) -->
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/mermaid.min.js"></script>
  <script src="vendor/leaflet.js"></script>
  <script src="mermaid-okia-theme.js"></script>
</head>
<body class="present-body">
  <div id="deck" class="deck"></div>

  <div class="present-progress"><div id="progressBar" class="present-progress-bar"></div></div>

  <button id="navPrev" class="nav-arrow nav-prev" aria-label="Diapositive précédente">‹</button>
  <button id="navNext" class="nav-arrow nav-next" aria-label="Diapositive suivante">›</button>
  <button id="presentEnd" class="present-end" aria-label="Quitter le diaporama">✕</button>

  <button id="presentMenuBtn" class="present-menu-btn" aria-label="Transitions">⚙</button>
  <div id="presentMenu" class="present-menu" hidden></div>

  <button id="presentGridBtn" class="present-grid-btn" aria-label="Vue d’ensemble des diapositives">▦</button>

  <div id="presentOverview" class="present-overview" hidden>
    <div class="overview-head">
      <span class="overview-title">Diapositives</span>
      <button id="overviewClose" class="overview-close" aria-label="Fermer">✕</button>
    </div>
    <div id="overviewGrid" class="overview-grid"></div>
  </div>

  <div id="counter" class="present-counter"></div>

  <script src="render.js"></script>
  <script src="presentation.js"></script>
</body>
</html>
