name: OKiaMarkdownViewer

options:
  bundleIdPrefix: ch.ok-ia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""               # Set your Apple Developer Team ID in Xcode (Signing & Capabilities)
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  OKiaMarkdownViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Swift source + asset catalog (Web folder excluded — added as a folder reference below)
      - path: OKiaMarkdownViewer
        excludes:
          - "Web/**"
          - "Samples/**"
      # Folder references: copied verbatim into the bundle so relative paths (vendor/, fonts/) are preserved.
      - path: OKiaMarkdownViewer/Web
        type: folder
      - path: OKiaMarkdownViewer/Samples
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.ok-ia.markdownviewer
        INFOPLIST_FILE: OKiaMarkdownViewer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad (Catalyst-friendly for Phase 2)
        SUPPORTS_MACCATALYST: NO        # Phase 2: flip to YES
        GENERATE_INFOPLIST_FILE: NO
