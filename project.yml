name: OKiaMarkdownViewer

options:
  bundleIdPrefix: ch.ok-ia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "9"
    DEVELOPMENT_TEAM: "72NVM63N83"      # Paid Apple Developer Program team (auto-signing) — used for TestFlight/App Store.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  OKiaMarkdownViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Swift source + asset catalog (Web folder excluded — added as a folder reference below)
      - path: OKiaMarkdownViewer
        excludes:
          - "Web/**"
          - "Samples/**"
      # Folder references: copied verbatim into the bundle so relative paths (vendor/, fonts/) are preserved.
      - path: OKiaMarkdownViewer/Web
        type: folder
      - path: OKiaMarkdownViewer/Samples
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.ok-ia.markdownviewer
        PRODUCT_NAME: md Viewer          # built app / executable name (display name lives in Info.plist)
        INFOPLIST_FILE: OKiaMarkdownViewer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: YES                    # macOS via Mac Catalyst
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO    # true Catalyst app (not "Designed for iPad")
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO  # same bundle id on Mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Run locally on Mac without a Mac provisioning profile (personal team)
        CODE_SIGN_IDENTITY[sdk=macosx*]: "-"
        GENERATE_INFOPLIST_FILE: NO
