name: OK-ia - md Viewer

options:
  bundleIdPrefix: ch.ok-ia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "19"
    DEVELOPMENT_TEAM: "PU9BSXN2V5"      # Paid Apple Developer Program team (auto-signing) — used for TestFlight/App Store.
                                        # (Build 14 and the store provisioning profile are under this team;
                                        #  72NVM63N83 was the cert-name suffix, not the team id.)
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  OKiaMarkdownViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Swift source + asset catalog (Web folder excluded — added as a folder reference below)
      - path: OKiaMarkdownViewer
        excludes:
          - "Web/**"
          - "Samples/**"
      # Folder references: copied verbatim into the bundle so relative paths (vendor/, fonts/) are preserved.
      - path: OKiaMarkdownViewer/Web
        type: folder
      - path: OKiaMarkdownViewer/Samples
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.ok-ia.markdownviewer
        PRODUCT_NAME: md Viewer          # built app / executable name (display name lives in Info.plist)
        INFOPLIST_FILE: OKiaMarkdownViewer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: YES                    # macOS via Mac Catalyst
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO    # true Catalyst app (not "Designed for iPad")
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO  # same bundle id on Mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # NOTE: local Mac run used CODE_SIGN_IDENTITY[sdk=macosx*]: "-" (ad-hoc); temporarily
        # removed for Mac App Store distribution archive (automatic signing picks Apple Distribution).
        # App Sandbox entitlements (mandatory for the Mac App Store) — macOS/Catalyst only, iOS untouched.
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: OKiaMarkdownViewer/macOS.entitlements
        GENERATE_INFOPLIST_FILE: NO

# Scheme named "md Viewer" so archives are filed under that name in the Organizer
# (the archive's Name = scheme name). The target keeps its internal id.
schemes:
  md Viewer:
    build:
      targets:
        OKiaMarkdownViewer: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      revealInOrganizer: true
